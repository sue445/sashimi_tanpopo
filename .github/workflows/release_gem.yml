name: Publish gem to rubygems.org

on:
  workflow_dispatch:

jobs:
  release:
    if: github.repository == 'sue445/sashimi_tanpopo'
    runs-on: ubuntu-latest

    outputs:
      tag_name: ${{ steps.set_output.outputs.tag_name }}

    environment:
      name: rubygems.org
      url: https://rubygems.org/gems/sashimi_tanpopo

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          bundler-cache: true
          ruby-version: ruby

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      # ref. https://zzzkan.me/blog/github-action-direct-push/
      - name: Prepare for git push by GitHub App
        run: |
          git config user.name ${GIT_USER_NAME}
          git config user.email ${GIT_USER_EMAIL}
          bundle exec rake fix_version
          git push
        env:
          GIT_USER_NAME: "${{ steps.app-token.outputs.app-slug }}[bot]"
          GIT_USER_EMAIL: "${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Publish to RubyGems
        uses: rubygems/release-gem@6317d8d1f7e28c24d28f6eff169ea854948bd9f7 # v1.2.0

      - name: Create GitHub release
        run: |
          tag_name="$(git describe --tags --abbrev=0)"
          gh release create "${tag_name}" --verify-tag --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - id: set_output
        run: |
          tag_name="$(git describe --tags --abbrev=0)"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

  push_to_ghcr_io:
    needs:
      - release

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ghcr.io/sue445/sashimi_tanpopo

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set TAG_VERSION
        run: |
          set -xe
          echo "TAG_VERSION=${TAG_NAME#v}" >> $GITHUB_ENV
        env:
          TAG_NAME: ${{ needs.release.outputs.tag_name }}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/sue445/sashimi_tanpopo:${{ needs.release.outputs.tag_name }}
            ghcr.io/sue445/sashimi_tanpopo:latest
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SASHIMI_TANPOPO_VERSION=${{ env.TAG_VERSION }}

      - name: Slack Notification
        uses: act10ns/slack@d96404edccc6d6467fc7f8134a420c851b1e9054 # v2.2.0
        if: always()
        continue-on-error: true
        with:
          status: ${{ job.status }}
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
